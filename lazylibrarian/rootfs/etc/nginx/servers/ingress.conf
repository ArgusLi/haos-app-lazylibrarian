server {
    listen %%interface%%:%%port%% default_server;

    client_max_body_size 0;

    # LazyLibrarian index() always does HTTPRedirect("home").
    # Skip the backend round-trip: nginx issues the redirect directly.
    location = /lazylibrarian {
        return 302 %%ingress_entry%%/lazylibrarian/home;
    }

    location / {
        add_header Access-Control-Allow-Origin *;
        proxy_pass         http://127.0.0.1:5299;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_set_header   Accept-Encoding "";
        proxy_connect_timeout 30m;
        proxy_send_timeout    30m;
        proxy_read_timeout    30m;

        # home() also always redirects (to authors/books/etc depending on HOMEPAGE config).
        # Rewrite CherryPy's absolute Location: http://127.0.0.1:5299/path
        # to the HA ingress-relative path the browser can follow.
        proxy_redirect ~^https?://[^/]+(/.*)$ %%ingress_entry%%$1;

        sub_filter_once off;
        sub_filter_types *;
        sub_filter /lazylibrarian %%ingress_entry%%/lazylibrarian;
    }
}
