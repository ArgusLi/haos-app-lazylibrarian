server {
    listen %%interface%%:%%port%% default_server;

    client_max_body_size 0;

    location / {
        add_header Access-Control-Allow-Origin *;
        proxy_pass         http://127.0.0.1:5299;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_set_header   Accept-Encoding "";
        proxy_connect_timeout 30m;
        proxy_send_timeout    30m;
        proxy_read_timeout    30m;

        # CherryPy generates absolute Location headers with Host: 127.0.0.1:5299
        # (nginx default $proxy_host). proxy_redirect does a text substitution on
        # the header — unlike "return", it does NOT add nginx's own host/port.
        proxy_redirect http://127.0.0.1:5299 %%ingress_entry%%;

        sub_filter_once off;
        sub_filter_types *;
        sub_filter /lazylibrarian %%ingress_entry%%/lazylibrarian;
    }
}
