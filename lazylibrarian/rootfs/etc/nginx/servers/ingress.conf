server {
    listen %%interface%%:%%port%% default_server;

    client_max_body_size 0;

    # Keep Location headers relative. Without this, nginx rewrites the relative
    # path produced by proxy_redirect back into an absolute
    # http://<host>:<ingress_port>/... URL (e.g. :8099) that the browser cannot
    # reach. Must stay off for ingress.
    absolute_redirect off;
    port_in_redirect  off;

    location / {
        add_header Access-Control-Allow-Origin *;
        proxy_pass         http://127.0.0.1:5299;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_set_header   Accept-Encoding "";
        proxy_connect_timeout 30m;
        proxy_send_timeout    30m;
        proxy_read_timeout    30m;

        # CherryPy emits absolute Location headers (index/home/trailing-slash all
        # redirect). Match ANY scheme://host and replace with the ingress prefix so
        # nginx's default rule (which leaks our own listen host:port, e.g. :8099)
        # never fires. Result is a relative /api/hassio_ingress/<token>/... path.
        proxy_redirect ~^https?://[^/]+(/.*)$ %%ingress_entry%%$1;

        # LazyLibrarian's bookstrap UI uses RELATIVE urls (href="audio",
        # src="js/lazylibrarian-bs.js", ajax "get_books?...") which already resolve
        # correctly under the ingress path. Only server-rendered absolute paths
        # (HTTP_ROOT-prefixed cover images, e.g. /lazylibrarian/cache/...) need the
        # ingress prefix. Match the trailing slash so we never touch the substring
        # "/lazylibrarian" buried inside a relative filename like
        # "js/lazylibrarian-bs.js" (which caused compounding 404s).
        sub_filter_once off;
        sub_filter_types *;
        sub_filter "/lazylibrarian/" "%%ingress_entry%%/lazylibrarian/";
    }
}
