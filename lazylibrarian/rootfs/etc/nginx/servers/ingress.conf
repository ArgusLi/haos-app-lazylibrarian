server {
    listen %%interface%%:%%port%% default_server;

    client_max_body_size 0;

    # CherryPy redirects GET /lazylibrarian → /lazylibrarian/ (trailing slash).
    # Proxy with trailing slash directly so CherryPy skips that first redirect.
    location = /lazylibrarian {
        proxy_pass         http://127.0.0.1:5299/lazylibrarian/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_set_header   Accept-Encoding "";
        proxy_connect_timeout 30m;
        proxy_send_timeout    30m;
        proxy_read_timeout    30m;

        # Rewrite absolute Location headers (e.g. http://127.0.0.1:5299/lazylibrarian/home)
        # to the HA ingress path so the browser can follow them.
        proxy_redirect ~^https?://[^/]+(/.*)$ %%ingress_entry%%$1;

        sub_filter_once off;
        sub_filter_types *;
        sub_filter /lazylibrarian %%ingress_entry%%/lazylibrarian;
    }

    location / {
        add_header Access-Control-Allow-Origin *;
        proxy_pass         http://127.0.0.1:5299;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_set_header   Accept-Encoding "";
        proxy_connect_timeout 30m;
        proxy_send_timeout    30m;
        proxy_read_timeout    30m;

        proxy_redirect ~^https?://[^/]+(/.*)$ %%ingress_entry%%$1;

        sub_filter_once off;
        sub_filter_types *;
        sub_filter /lazylibrarian %%ingress_entry%%/lazylibrarian;
    }
}
